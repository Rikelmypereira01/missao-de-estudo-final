name: Unzip project

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip *.zip
          rm -rf .github
          mv missao-de-estudo-platform/* .
          rm -rf missao-de-estudo-platform
          rm -f *.zip

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Extract project files" || echo "Nothing to commit"
          git push
